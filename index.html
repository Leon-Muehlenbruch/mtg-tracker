<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MTG Tournament Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
:root{--gold:#c9a84c;--gold-l:#e8c97a;--gold-d:#8b6914;--bg:#0a0a0f;--s1:#111118;--s2:#1a1a24;--bdr:rgba(201,168,76,.22);--txt:#e8e0d0;--mut:#7a7060;--win:#4caf82;--loss:#cf6679;--draw:#7a9ccf}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font-family:'Crimson Pro',Georgia,serif;min-height:100vh}
body::before{content:'';position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse at 15% 15%,rgba(201,168,76,.05) 0%,transparent 55%),radial-gradient(ellipse at 85% 85%,rgba(80,40,160,.06) 0%,transparent 55%)}
.wrap{position:relative;z-index:1;max-width:960px;margin:0 auto;padding:36px 18px 80px}
header{text-align:center;margin-bottom:38px}
.orn{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:10px}
.oline{flex:1;height:1px;background:linear-gradient(to right,transparent,var(--gold),transparent);max-width:110px}
.diam{width:7px;height:7px;background:var(--gold);transform:rotate(45deg)}
h1{font-family:'Cinzel',serif;font-size:clamp(1.7rem,4.5vw,2.5rem);font-weight:900;letter-spacing:.08em;color:var(--gold-l);text-shadow:0 0 40px rgba(201,168,76,.3)}
.sub{font-style:italic;color:var(--mut);font-size:.96rem;margin-top:4px}
.tid{font-family:'Cinzel',serif;font-size:.66rem;letter-spacing:.18em;color:var(--gold);margin-top:3px;opacity:.85}
.panel{background:var(--s1);border:1px solid var(--bdr);border-radius:2px;padding:22px 24px;margin-bottom:12px;position:relative}
.panel::before{content:'';position:absolute;top:-1px;left:16px;right:16px;height:2px;background:linear-gradient(to right,transparent,var(--gold),transparent)}
.lbl{font-family:'Cinzel',serif;font-size:.64rem;letter-spacing:.2em;color:var(--gold);text-transform:uppercase;margin-bottom:8px}
input[type=text],input[type=password]{background:var(--s2);border:1px solid var(--bdr);border-radius:2px;color:var(--txt);font-family:'Crimson Pro',serif;font-size:.95rem;padding:8px 12px;outline:none;transition:border-color .2s;width:100%}
input[type=text]:focus,input[type=password]:focus{border-color:var(--gold)}
input::placeholder{color:var(--mut)}
.row-url{display:flex;gap:8px;margin-bottom:16px}.row-url input{flex:1}
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
@media(max-width:540px){.pgrid{grid-template-columns:1fr}}
.prow{display:flex;gap:5px}.prow input{flex:1}
.btnx{background:transparent;border:1px solid rgba(207,102,121,.2);color:var(--mut);width:30px;flex-shrink:0;cursor:pointer;border-radius:2px;font-size:.95rem}
.btnx:hover{background:rgba(207,102,121,.15);color:var(--loss)}
.ctrl{display:flex;align-items:center;gap:12px;margin-top:14px;flex-wrap:wrap}
.btnadd{background:transparent;border:1px solid var(--bdr);color:var(--gold);font-family:'Cinzel',serif;font-size:.67rem;letter-spacing:.1em;padding:8px 14px;cursor:pointer;border-radius:2px}
.btnadd:hover{background:rgba(201,168,76,.1)}
.btngo{background:linear-gradient(135deg,var(--gold-d),var(--gold));border:none;color:var(--bg);font-family:'Cinzel',serif;font-size:.76rem;font-weight:700;letter-spacing:.14em;padding:10px 24px;cursor:pointer;border-radius:2px}
.btngo:hover:not(:disabled){filter:brightness(1.1)}
.btngo:disabled{opacity:.45;cursor:not-allowed}
.autolbl{display:flex;align-items:center;gap:6px;font-size:.85rem;color:var(--mut);cursor:pointer}
.autolbl input{accent-color:var(--gold)}
.ts{margin-left:auto;font-size:.78rem;color:var(--mut);font-style:italic}
.sbar{display:flex;align-items:center;gap:9px;padding:10px 15px;background:var(--s2);border:1px solid var(--bdr);border-radius:2px;margin-bottom:18px;font-size:.88rem;color:var(--mut);min-height:40px}
.spin{width:13px;height:13px;border:2px solid rgba(201,168,76,.2);border-top-color:var(--gold);border-radius:50%;animation:sp .8s linear infinite;flex-shrink:0}
@keyframes sp{to{transform:rotate(360deg)}}
.sdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sdot.ok{background:var(--win)}.sdot.er{background:var(--loss)}.sdot.id{background:var(--mut)}.sdot.ld{background:#e8a84c}
.round-section{margin-bottom:18px;display:none}
.round-lbl{font-family:'Cinzel',serif;font-size:.64rem;letter-spacing:.18em;color:var(--mut);text-transform:uppercase;margin-bottom:8px}
.rtabs{display:flex;gap:5px;flex-wrap:wrap}
.rtab{font-family:'Cinzel',serif;font-size:.64rem;letter-spacing:.09em;padding:6px 11px;border:1px solid var(--bdr);background:transparent;color:var(--mut);cursor:pointer;border-radius:2px;white-space:nowrap}
.rtab.done{color:var(--txt);border-color:rgba(201,168,76,.38)}
.rtab.active{background:rgba(201,168,76,.14);border-color:var(--gold);color:var(--gold-l)}
.cards{display:grid;gap:11px}
.pcard{background:var(--s1);border:1px solid var(--bdr);border-radius:2px;overflow:hidden;animation:fu .3s ease forwards;opacity:0;transform:translateY(8px)}
@keyframes fu{to{opacity:1;transform:translateY(0)}}
.pch{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;padding:13px 18px;border-bottom:1px solid var(--bdr);background:linear-gradient(to right,rgba(201,168,76,.06),transparent)}
.pn{font-family:'Cinzel',serif;font-size:.96rem;font-weight:700;color:var(--gold-l)}
.pr{font-family:'Cinzel',serif;font-size:.61rem;letter-spacing:.13em;color:var(--mut);margin-top:2px}
.bdgs{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.b{font-family:'Cinzel',serif;font-size:.66rem;font-weight:700;padding:3px 9px;border-radius:1px;letter-spacing:.08em}
.bd1{background:rgba(201,168,76,.1);color:var(--gold);border:1px solid rgba(201,168,76,.28)}
.bd2{background:rgba(76,175,130,.1);color:var(--win);border:1px solid rgba(76,175,130,.28)}
.bout{background:rgba(207,102,121,.07);color:var(--mut);border:1px solid rgba(207,102,121,.18)}
.bw{background:rgba(76,175,130,.1);color:var(--win);border:1px solid rgba(76,175,130,.28)}
.bl{background:rgba(207,102,121,.1);color:var(--loss);border:1px solid rgba(207,102,121,.28)}
.bdr2{background:rgba(122,156,207,.1);color:var(--draw);border:1px solid rgba(122,156,207,.28)}
.pcb{padding:11px 18px}
.meta{display:flex;gap:16px;flex-wrap:wrap;font-size:.85rem}
.mi{display:flex;flex-direction:column;gap:1px}
.mk{font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.12em;color:var(--mut);text-transform:uppercase}
.mv{font-weight:600}
.hist{margin-top:8px;display:flex;gap:3px;flex-wrap:wrap}
.pip{width:18px;height:18px;border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:.57rem;font-weight:700;font-family:'Cinzel',serif}
.pip.W{background:rgba(76,175,130,.16);color:var(--win);border:1px solid rgba(76,175,130,.32)}
.pip.L{background:rgba(207,102,121,.16);color:var(--loss);border:1px solid rgba(207,102,121,.32)}
.pip.D{background:rgba(122,156,207,.16);color:var(--draw);border:1px solid rgba(122,156,207,.32)}
.pip-cur{width:18px;height:18px;border-radius:2px;border:1px dashed rgba(201,168,76,.4);background:rgba(201,168,76,.05)}
.nf{padding:12px 18px;font-style:italic;color:var(--mut);font-size:.87rem}
.empty-state{text-align:center;padding:50px 20px;color:var(--mut)}
.empty-ico{font-size:2.4rem;margin-bottom:10px;opacity:.3}
.dbgbtn{font-size:.68rem;color:var(--mut);background:none;border:none;cursor:pointer;text-decoration:underline}
.dbgbox{display:none;background:var(--s2);border:1px solid rgba(201,168,76,.1);border-radius:2px;padding:10px 14px;margin-bottom:12px;font-family:monospace;font-size:.71rem;color:var(--mut);max-height:200px;overflow-y:auto;white-space:pre-wrap;word-break:break-all}
.dbgbox.on{display:block}

.apirow input{flex:1}
.apilbl{font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.15em;color:var(--mut);white-space:nowrap}

</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="orn"><div class="oline"></div><div class="diam"></div><div class="oline"></div></div>
    <h1>MTG TOURNAMENT TRACKER</h1>
    <div class="sub">Live Standings &middot; melee.gg</div>
    <div class="tid" id="tid-lbl">Turin RC 2026 &middot; #392336</div>
    <div class="orn" style="margin-top:10px"><div class="oline"></div><div class="diam"></div><div class="oline"></div></div>
  </header>

<script>
// Nutze lokalen Server falls verfügbar, sonst Cloudflare Worker
var PROXY='https://mtg-tracker-proxy.leonmuehlenbruch.workers.dev';
var LOCAL='http://localhost:3333';
async function getProxy(){
  try{
    const r=await fetch(LOCAL+'/Tournament/View/1',{signal:AbortSignal.timeout(800)});
    return LOCAL;
  }catch(e){return PROXY;}
}
var _proxy=null;
async function proxy(){if(!_proxy)_proxy=await getProxy();return _proxy;}
var autoTimer=null,allRounds=[],standingsCache={},activeIdx=null,totalRounds=0,rid=0;
function gel(id){return document.getElementById(id);}
function st(t,m,s){gel('sbar').innerHTML=s?'<div class="spin"></div><span>'+m+'</span>':'<div class="sdot '+t+'"></div><span>'+m+'</span>';}
function dbg(s){gel('dbgbox').textContent=(typeof s==='object'?JSON.stringify(s,null,2):String(s)).slice(0,4000);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function getTid(url){var m=(url||'').trim().match(/\/(\d+)\/?$/);return m?m[1]:null;}
function names(){return Array.from(document.querySelectorAll('#pgrid input[type=text]')).map(function(i){return i.value.trim();}).filter(Boolean);}



// Lade Spielernamen aus players.txt (lokaler Server)
async function loadPlayersFromFile(){
  try{
    var r=await fetch((await proxy())+'/players.txt',{signal:AbortSignal.timeout(1000)});
    if(!r.ok)return false;
    var txt=await r.text();
    var names=txt.split('\n').map(s=>s.trim()).filter(Boolean);
    if(!names.length)return false;
    // Clear existing rows
    gel('pgrid').innerHTML='';
    names.forEach(function(n){addRow(n);});
    console.log('players.txt geladen:', names);
    return true;
  }catch(e){return false;}
}

// turl listener wird nach DOM-Ready gesetzt (siehe IIFE unten)
function setupUrlListener(){
  gel('turl').addEventListener('input',function(){
    var id=getTid(gel('turl').value);
    var map={'392336':'Turin RC 2026','392401':'Lyon Spotlight 2026'};
    if(id)gel('tid-lbl').textContent=(map[id]||'Turnier')+' \u00b7 #'+id;
    localStorage.setItem('turl',gel('turl').value);
  });
}

function addRow(v){v=v||'';var c=gel('pgrid'),id=++rid,d=document.createElement('div');d.className='prow';d.id='r'+id;d.innerHTML='<input type="text" placeholder="Name (wie auf melee.gg)" value="'+esc(v)+'" onkeydown="if(event.key===\'Enter\')init()"><button class="btnx" onclick="document.getElementById(\'r'+id+'\').remove()">\u00d7</button>';c.appendChild(d);if(!v)setTimeout(function(){var inp=d.querySelector('input');if(inp)inp.focus();},10);}

async function pf(path,opts){return fetch((await proxy())+path,opts||{});}

async function init(){
  var tid=getTid(gel('turl').value);
  if(!tid){st('er','Ungueltige Turnier-URL');return;}
  if(!names().length){st('er','Bitte mindestens einen Spielernamen eingeben');return;}  gel('gobtn').disabled=true;
  gel('round-section').style.display='none';
  standingsCache={};allRounds=[];
  try{
    st('ld','Lade Turnierdaten...',true);
    var htmlResp=await pf('/Tournament/View/'+tid);
    if(!htmlResp.ok)throw new Error('Tournament page HTTP '+htmlResp.status);
    var html=await htmlResp.text();
    var pat=/data-id="(\d+)"\s+data-name="([^"]+)"\s+data-is-completed="([^"]+)"/g,m;
    while((m=pat.exec(html))!==null)allRounds.push({id:m[1],label:m[2],done:m[3].toLowerCase()==='true'});
    dbg('Rounds found: '+allRounds.length+'\n'+allRounds.map(function(r){return r.id+' '+r.label;}).join('\n'));
    if(!allRounds.length){st('id','Keine Runden gefunden');gel('cards').innerHTML='<div class="empty-state"><p>Das Turnier hat noch nicht begonnen</p></div>';return;}
    var playoffs=['Quarterfinals','Semifinals','Finals'];
    totalRounds=allRounds.filter(function(r){return!playoffs.includes(r.label);}).length;
    renderTabs();
    gel('round-section').style.display='block';
    var latestDone=0;allRounds.forEach(function(r,i){if(r.done)latestDone=i;});
    await selectRound(latestDone);
    gel('ts').textContent='Stand: '+new Date().toLocaleTimeString('de-DE');
  }catch(e){
    st('er','Fehler: '+e.message);
    dbg('Error: '+e.message+'\n'+(e.stack||''));
    gel('cards').innerHTML='<div class="empty-state"><p>'+esc(e.message)+'</p></div>';
  }finally{gel('gobtn').disabled=false;}
}

function renderTabs(){gel('rtabs').innerHTML=allRounds.map(function(r,i){return'<button class="rtab'+(r.done?' done':'')+'" id="rtab'+i+'" onclick="selectRound('+i+')">'+esc(r.label)+'</button>';}).join('');}

async function selectRound(idx){
  activeIdx=idx;
  document.querySelectorAll('.rtab').forEach(function(el,i){el.classList.toggle('active',i===idx);});
  var round=allRounds[idx];
  if(!standingsCache[round.id]){
    st('ld','Lade Standings · '+round.label+'... (20-30 Sek)',true);
    try{
      var tid=getTid(gel('turl').value);
      var ns=names().join(', ');
      var resp=await pf('/Standing/GetRoundStandings',{
        method:'POST',
        headers:{
          'Content-Type':'application/x-www-form-urlencoded; charset=UTF-8'},
        body:'roundId='+round.id+'&tid='+tid+'&playerNames='+encodeURIComponent(ns)
      });
      var text=await resp.text();
      dbg('Response ['+round.id+']:\n'+text.slice(0,800));
      var data;try{data=JSON.parse(text);}catch(e2){throw new Error('Kein JSON: '+text.slice(0,150));}
      if(data.Error||data.error)throw new Error(data.Message||data.error||'API Fehler');
      standingsCache[round.id]=data.data||data.Data||[];
    }catch(e){st('er','Fehler: '+e.message);dbg('Error: '+e.message);return;}
  }
  renderCards(round);
}

function renderCards(round){
  var standings=standingsCache[round.id]||[];
  var watched=names().map(function(n){return n.toLowerCase().trim();});
  if(!standings.length){st('id',round.label+': Keine Daten');gel('cards').innerHTML='<div class="empty-state"><p>Keine Daten</p></div>';return;}
  var results=watched.map(function(wname){var hit=standings.find(function(s){var n=getName(s).toLowerCase();return n===wname||n.includes(wname)||wname.includes(n)||(n.split(' ').pop()===wname.split(' ').pop()&&wname.split(' ').pop().length>2);});return{wname:wname,standing:hit||null};});
  var found=results.filter(function(r){return r.standing;}).length;
  st('ok',round.label+' \u00b7 '+found+'/'+watched.length+' Spieler \u00b7 '+standings.length+' total');
  gel('cards').innerHTML=results.map(function(r,i){return makeCard(r,i,round);}).join('');
}

function getName(s){if(s.Team&&s.Team.Players&&s.Team.Players[0])return s.Team.Players[0].DisplayName||s.Team.Players[0].Name||'';if(s.Players&&s.Players[0])return s.Players[0].DisplayName||s.Players[0].Name||'';return s.Name||s.PlayerName||s.DisplayName||s.TeamName||'';}

function makeCard(obj,idx,round){
  var wname=obj.wname,s=obj.standing,delay=idx*60;
  if(!s)return'<div class="pcard" style="animation-delay:'+delay+'ms"><div class="pch"><div class="pn">'+esc(wname)+'</div></div><div class="nf">Nicht in '+esc(round.label)+' gefunden</div></div>';
  var name=getName(s);
  var rank=s.Rank!=null?s.Rank:(s.Place!=null?s.Place:null);
  var pts=s.Points!=null?s.Points:(s.MatchPoints!=null?s.MatchPoints:null);
  var mr=s.MatchRecord||'',gr=s.GameRecord||'';
  var parts=mr.split('-').map(Number);
  var wins=isNaN(parts[0])?(s.Wins||0):(parts[0]||0);
  var losses=isNaN(parts[1])?(s.Losses||0):(parts[1]||0);
  var draws=isNaN(parts[2])?(s.Draws||0):(parts[2]||0);
  var omwp=s.OpponentMatchWinPercentage!=null?s.OpponentMatchWinPercentage:null;
  var gwp=s.TeamGameWinPercentage!=null?s.TeamGameWinPercentage:(s.GameWinPercentage!=null?s.GameWinPercentage:null);
  var ogwp=s.OpponentGameWinPercentage!=null?s.OpponentGameWinPercentage:null;
  var adv=s.AdvancedToNextPhase||false;
  var dayBadge=adv?'<span class="b bd2">Tag 2 &#10003;</span>':losses>=3?'<span class="b bout">Ausgeschieden</span>':'<span class="b bd1">Tag 1</span>';
  var hist=[];for(var i=0;i<wins;i++)hist.push('W');for(var i=0;i<losses;i++)hist.push('L');for(var i=0;i<draws;i++)hist.push('D');
  var pips=hist.map(function(r){return'<div class="pip '+r+'">'+r+'</div>';}).join('');
  var pending='';for(var i=0;i<Math.max(0,totalRounds-hist.length);i++)pending+='<div class="pip-cur"></div>';
  var meta='';
  if(pts!=null)meta+='<div class="mi"><span class="mk">Punkte</span><span class="mv">'+pts+'</span></div>';
  if(mr)meta+='<div class="mi"><span class="mk">Match</span><span class="mv">'+esc(mr)+'</span></div>';
  if(gr)meta+='<div class="mi"><span class="mk">Games</span><span class="mv">'+esc(gr)+'</span></div>';
  if(omwp!=null)meta+='<div class="mi"><span class="mk">OMW%</span><span class="mv">'+(omwp*100).toFixed(1)+'%</span></div>';
  if(gwp!=null)meta+='<div class="mi"><span class="mk">GW%</span><span class="mv">'+(gwp*100).toFixed(1)+'%</span></div>';
  if(ogwp!=null)meta+='<div class="mi"><span class="mk">OGW%</span><span class="mv">'+(ogwp*100).toFixed(1)+'%</span></div>';
  return'<div class="pcard" style="animation-delay:'+delay+'ms"><div class="pch"><div><div class="pn">'+esc(name)+'</div>'+(rank!=null?'<div class="pr">Rang #'+rank+'</div>':'')+'</div><div class="bdgs">'+dayBadge+'<span class="b bw">'+wins+'W</span><span class="b bl">'+losses+'L</span>'+(draws>0?'<span class="b bdr2">'+draws+'D</span>':'')+'</div></div><div class="pcb">'+(meta?'<div class="meta">'+meta+'</div>':'')+((pips||pending)?'<div class="hist">'+pips+pending+'</div>':'')+'</div></div>';
}

function toggleAuto(){clearInterval(autoTimer);if(gel('autocb').checked)autoTimer=setInterval(function(){if(names().length){standingsCache={};init();}},300000);}

(async function(){
  setupUrlListener();
  var su=localStorage.getItem('turl');
  if(su){gel('turl').value=su;gel('turl').dispatchEvent(new Event('input'));}
  var loaded=await loadPlayersFromFile();
  if(!loaded){addRow();addRow();addRow();}
})();
</script>
</body>
</html>
